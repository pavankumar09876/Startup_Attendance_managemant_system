version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: wfp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-wfp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wfp_pass}
      POSTGRES_DB:       ${POSTGRES_DB:-workforce_pro}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wfp_user} -d ${POSTGRES_DB:-workforce_pro}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (for caching / celery) ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wfp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wfp_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-wfp_user}:${POSTGRES_PASSWORD:-wfp_pass}@db:5432/${POSTGRES_DB:-workforce_pro}
      SECRET_KEY:   ${SECRET_KEY:-change-me-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      REDIS_URL:    redis://redis:6379
      ENV:          ${ENV:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Frontend (Vite dev server) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wfp_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_WS_URL:  ${VITE_WS_URL:-ws://localhost:8000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  uploads_data:
